<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Connection warm-up for the API origin ────────────────────
         Backend is a separate Render service; several pages (e.g. /jobs)
         fetch data on mount, so this DNS+TLS handshake would otherwise
         only start after the JS bundle parses and the first request
         fires. preconnect does it in parallel with HTML parsing.
         dns-prefetch is the same-origin-agnostic fallback for browsers
         that don't support preconnect. -->
    <!-- NOTE: hardcoded rather than %VITE_API_URL% — Vite's html env
         interpolation throws a hard build error if that var isn't set,
         and there's no committed .env (only .env.example). If the
         backend origin changes, update this alongside render.yaml. -->
    <link rel="preconnect" href="https://hirex-f.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://hirex-f.onrender.com" />
    <meta name="theme-color" content="#ff6524" />
    <meta name="color-scheme" content="light" />
    <meta name="format-detection" content="telephone=no" />

    <title>HireX — India's #1 Job Platform</title>
    <meta name="description"
          content="HireX connects professionals with top companies across India. Browse 50,000+ jobs, apply in one click, and track every application in real time." />

    <!-- ── Structured data (Organization) — helps rich results ────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "HireX",
      "url": "https://hirex.in",
      "logo": "https://hirex.in/og-default.png",
      "sameAs": ["https://twitter.com/HireXIn"]
    }
    </script>

    <!-- <Open Graph> -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="HireX" />
    <meta property="og:title"       content="HireX — India's #1 Job Platform" />
    <meta property="og:description" content="HireX connects professionals with top companies across India. Browse 50,000+ jobs, apply in one click, and track every application in real time." />
    <meta property="og:image"       content="https://hirex.in/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <!-- <meta property="og:image:height"content="630" /> -->
     <meta property="og:image:height" content="630" />
    <meta property="og:url"         content="https://hirex.in" />

    <!-- ── Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@HireXIn" />
    <meta name="twitter:title"       content="HireX — India's #1 Job Platform" />
    <meta name="twitter:description" content="HireX connects professionals with top companies across India. Browse 50,000+ jobs, apply in one click, and track every application in real time." />
    <meta name="twitter:image"       content="https://hirex.in/og-default.png" />

    <!-- ── Canonical ─────────────────────────────────────────────── -->
    <link rel="canonical" href="https://hirex.in" />

    <!-- ── Robots ────────────────────────────────────────────────── -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run HireX.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
